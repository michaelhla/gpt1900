# NanoChat nginx config for continuous-batching serving.
#
# This is a reference config. The launch_serving.sh script generates a
# dynamic version at /tmp/nanochat_nginx.conf with the correct number of
# upstream workers. Use this file as a template for manual deployment.
#
# Usage:
#   sudo nginx -c /path/to/nanochat.conf
#
# NOTE: For production, put Cloudflare (free tier) in front for DDoS protection.

worker_processes auto;
error_log /var/log/nginx/nanochat_error.log warn;
pid /run/nginx/nanochat.pid;

events {
    worker_connections 4096;
}

http {
    # Rate limiting: 10 requests/second per IP, burst of 20
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/s;
    # Max 4 concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    log_format main '$remote_addr - [$time_local] "$request" $status '
                    '$body_bytes_sent "$http_referer" '
                    'upstream=$upstream_addr rt=$request_time';
    access_log /var/log/nginx/nanochat_access.log main;

    # One upstream per GPU worker (8x H100 setup)
    upstream nanochat {
        least_conn;
        server 127.0.0.1:8001;
        server 127.0.0.1:8002;
        server 127.0.0.1:8003;
        server 127.0.0.1:8004;
        server 127.0.0.1:8005;
        server 127.0.0.1:8006;
        server 127.0.0.1:8007;
        server 127.0.0.1:8008;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;

        # TLS certificates — update paths for your setup:
        # - Cloudflare origin cert: create at SSL/TLS > Origin Server > Create Certificate
        # - Let's Encrypt: run `sudo certbot --nginx -d yourdomain.com`
        ssl_certificate     /etc/ssl/nanochat.pem;
        ssl_certificate_key /etc/ssl/nanochat.key;

        # Rate limiting
        limit_req zone=chat_limit burst=20 nodelay;
        limit_conn conn_limit 4;

        # SSE-compatible proxy settings
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;    # critical for SSE streaming
        proxy_cache off;
        chunked_transfer_encoding on;

        # Chat UI and API
        location / {
            proxy_pass http://nanochat;
            proxy_read_timeout 300s;  # allow long generations
        }

        # Health check (fast timeout)
        location /health {
            proxy_pass http://nanochat;
            proxy_read_timeout 5s;
        }

        # Stats endpoint
        location /stats {
            proxy_pass http://nanochat;
            proxy_read_timeout 5s;
        }

        # Rate limit error response
        error_page 503 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 503 '{"error": "Rate limited. Please try again shortly."}';
        }
    }
}
