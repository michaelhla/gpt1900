<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GPT-1900</title>
    <link rel="icon" type="image/png" sizes="96x96" href="/icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FEFCF8;
            --paper: #F5E6D0;
            --paper-dark: #EDD9BE;
            --tan: #D2B48C;
            --brown: #8B7355;
            --dark-brown: #3E2723;
            --darker-brown: #2C1810;
            --gold: #B8860B;
            --gold-light: #D4A853;
            --gold-muted: #A0845C;
            --ink: #1A120B;
            --ink-light: #4A3728;
            --red-accent: #8B2500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background-color: var(--cream);
        }

        body {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            color: var(--ink);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(210,180,140,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(184,134,11,0.03) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 80%, rgba(139,115,85,0.04) 0%, transparent 45%),
                linear-gradient(180deg, #FFFFFF 0%, #FEFCF8 50%, #FBF7F2 100%);
            background-attachment: fixed;
        }

        /* ── Chat view ──────────────────────────────────── */

        .chat-view {
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        .chat-view.welcome-active {
            justify-content: center;
        }

        .chat-view.welcome-active .chat-container {
            flex: none;
        }

        .chat-view.welcome-active .chat-wrapper {
            padding-bottom: 0.5rem;
        }

        .chat-view.welcome-active .input-area {
            padding-top: 0.25rem;
            padding-bottom: calc(2rem + env(safe-area-inset-bottom));
        }

        /* ── Welcome screen ─────────────────────────── */

        .chat-container.welcome-state {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0.5rem 2rem;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-logo {
            width: 200px;
            height: 200px;
            margin-bottom: -0.3rem;
        }

        .welcome-title {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1.9rem;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: 0.03em;
            margin-bottom: 0.3rem;
        }

        .welcome-subtitle {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-style: italic;
            font-size: 1.05rem;
            color: var(--dark-brown);
            margin-bottom: 0.6rem;
        }

        .welcome-description {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1rem;
            color: var(--dark-brown);
            opacity: 0.85;
            max-width: 36rem;
            line-height: 1.6;
        }

        .welcome-hint {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 0.9rem;
            color: var(--dark-brown);
            opacity: 0.55;
            margin-top: 0.5rem;
            font-style: italic;
        }

        /* ── Chat header (shown during chat) ────────── */

        .chat-nav {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            flex-shrink: 0;
        }

        .chat-nav.visible {
            display: flex;
        }

        .chat-nav-title {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--dark-brown);
            letter-spacing: 0.03em;
        }

        .chat-nav-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .nav-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid rgba(210,180,140,0.5);
            background: transparent;
            color: var(--brown);
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: rgba(210,180,140,0.15);
            border-color: var(--tan);
        }

        /* ── Info modal ────────────────────────────── */

        .info-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26,18,11,0.3);
            z-index: 100;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .info-overlay.visible {
            display: flex;
        }

        .info-modal {
            background: var(--cream);
            border: 1px solid rgba(210,180,140,0.5);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 28rem;
            width: 90%;
            box-shadow: 0 8px 32px rgba(139,115,85,0.15);
            animation: fadeIn 0.3s ease;
        }

        .info-modal-logo {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .info-modal-title {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark-brown);
            margin-bottom: 0.3rem;
        }

        .info-modal-subtitle {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: var(--brown);
            margin-bottom: 1rem;
        }

        .info-modal-body {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1rem;
            color: var(--ink-light);
            line-height: 1.7;
            margin-bottom: 1.2rem;
        }

        .info-modal-close {
            display: block;
            margin: 0 auto;
            padding: 0.4rem 1.5rem;
            border: 1px solid var(--tan);
            border-radius: 2rem;
            background: transparent;
            color: var(--brown);
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .info-modal-close:hover {
            background: rgba(210,180,140,0.15);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            overscroll-behavior: contain;
        }

        .chat-wrapper {
            max-width: 44rem;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .message {
            display: flex;
            margin-bottom: 0.5rem;
            animation: msgAppear 0.3s ease;
        }

        @keyframes msgAppear {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
            align-items: flex-start;
        }

        .trailing-icon {
            width: 100px;
            height: 100px;
            display: block;
            margin: 0.5rem 0 0.5rem;
            object-fit: contain;
            transition: transform 0.15s ease;
        }


        .message-content {
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 1.05rem;
            max-width: 100%;
            word-wrap: break-word;
        }

        .message.assistant .message-content {
            background: transparent;
            padding: 0.2rem 0;
            color: var(--ink);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, rgba(210,180,140,0.2), rgba(210,180,140,0.3));
            border: 1px solid rgba(210,180,140,0.35);
            border-radius: 1rem 1rem 0.25rem 1rem;
            padding: 0.7rem 1rem;
            max-width: 70%;
            color: var(--ink);
        }

        .message.console .message-content {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 0.9rem;
            background: rgba(210,180,140,0.12);
            border: 1px solid rgba(210,180,140,0.25);
            padding: 0.6rem 0.9rem;
            color: var(--brown);
            border-radius: 3px;
            max-width: 80%;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 3px;
            align-items: center;
            padding: 0.2rem 0;
        }

        .typing-indicator span {
            width: 4px;
            height: 4px;
            background: var(--brown);
            border-radius: 50%;
            animation: typingDot 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingDot {
            0%, 60%, 100% { opacity: 0.2; transform: scale(0.85); }
            30% { opacity: 0.9; transform: scale(1); }
        }

        .input-area {
            padding: 0.75rem 1.5rem;
            padding-bottom: calc(1rem + env(safe-area-inset-bottom));
            background: transparent;
            flex-shrink: 0;
        }

        .input-wrapper {
            max-width: 44rem;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            background: rgba(254,252,248,0.85);
            border: 1px solid rgba(210,180,140,0.45);
            border-radius: 1.25rem;
            padding: 0.4rem 0.5rem 0.4rem 1rem;
            box-shadow: 0 2px 16px rgba(139,115,85,0.08), 0 1px 4px rgba(139,115,85,0.06);
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--gold-muted);
            box-shadow: 0 2px 20px rgba(139,115,85,0.12), 0 0 0 2px rgba(184,134,11,0.06);
        }

        .chat-input {
            width: 100%;
            position: relative;
            z-index: 1;
            padding: 0.55rem 0.5rem;
            border: none;
            border-radius: 0;
            background: transparent;
            color: var(--ink);
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1.05rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            min-height: 42px;
            max-height: 180px;
        }

        .chat-input::placeholder {
            color: transparent;
        }

        .input-field-wrap {
            flex: 1;
            position: relative;
            min-height: 42px;
        }

        .placeholder-roller {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 0.55rem 0.5rem;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1.05rem;
            font-style: italic;
            line-height: 1.5;
            color: var(--brown);
            opacity: 0.5;
            pointer-events: none;
            overflow: hidden;
            height: 42px;
        }

        .placeholder-roller span {
            display: block;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .placeholder-roller span.slide-out {
            transform: translateY(-100%);
            opacity: 0;
        }

        .placeholder-roller span.slide-in-prep {
            transform: translateY(100%);
            opacity: 0;
            transition: none;
        }

        .send-btn {
            flex-shrink: 0;
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 50%;
            background: var(--dark-brown);
            color: var(--cream);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--darker-brown);
        }

        .send-btn:disabled {
            cursor: not-allowed;
            opacity: 0.35;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
        }

        .single-turn-notice {
            max-width: 44rem;
            margin: 0 auto;
            padding: 0.5rem 0.75rem;
            background: rgba(210,180,140,0.12);
            border: 1px solid rgba(210,180,140,0.25);
            border-radius: 0.5rem;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 0.9rem;
            color: var(--ink-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            animation: msgAppear 0.3s ease;
        }

        .single-turn-notice button {
            background: none;
            border: none;
            color: var(--brown);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0 0.2rem;
            opacity: 0.6;
        }

        .single-turn-notice button:hover {
            opacity: 1;
        }

        .message .message-content .error-message {
            color: #C0392B;
            font-size: 0.95rem;
            font-style: italic;
        }

        .input-footer {
            text-align: center;
            padding: 0.4rem 0 0;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-style: italic;
            font-size: 0.75rem;
            color: var(--brown);
            opacity: 0.45;
            max-width: 44rem;
            margin: 0 auto;
        }

        /* ── Responsive ─────────────────────────────────── */

        @media (max-width: 520px) {
            .message.user .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>

    <!-- ── Chat Interface ───────────────────────── -->
    <div class="chat-view welcome-active" id="chatView">
        <div class="chat-container welcome-state" id="chatContainer">
            <div class="chat-wrapper" id="chatWrapper">
                <div class="welcome-content" id="welcomeContent">
                    <img src="/icon.png" alt="GPT-1900" class="welcome-logo">
                    <div class="welcome-title">GPT-1900 (BETA)</div>
                    <div class="welcome-description">A language model trained exclusively on text from before 1900 — books, newspapers, letters, and scholarship from the nineteenth century and earlier.</div>
                    <div class="welcome-description" style="margin-top: 1.5rem; padding: 1rem 1.25rem; border: 2px solid var(--red-accent); border-radius: 0.5rem; background: rgba(139,37,0,0.06); color: var(--red-accent); font-weight: 500;">Thank you for using GPT-1900! The model has been moved to <a href="https://huggingface.co/collections/mhla/gpt-1900" target="_blank" style="color: var(--red-accent); text-decoration: underline; font-weight: 600;">Hugging Face</a> due to high hosting costs.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ── Welcome idle states ─────────────────── */

        let idleTimeout = null;
        let idleActive = false;

        const idleStates = [
            '/icon-newspaper.png',  // reading
            '/icon-cigar.png',      // smoking
            '/icon-sleep.png',      // sleeping
            '/icon-cards.png',      // playing cards
            '/icon-chess.png',      // playing chess
            '/icon-whistle.png',    // whistling
            '/icon-writing.png',    // writing
            '/icon-yawn.png',       // yawning
        ];

        function idleLoop() {
            if (!idleActive) return;
            const logo = document.querySelector('.welcome-logo');
            if (!logo) return;
            const state = idleStates[Math.floor(Math.random() * idleStates.length)];
            logo.src = state;
            idleTimeout = setTimeout(() => {
                if (!idleActive) return;
                logo.src = '/icon.png';
                idleTimeout = setTimeout(idleLoop, 3000);
            }, 3000);
        }

        function startIdleAnimation() {
            idleActive = true;
            idleTimeout = setTimeout(idleLoop, 3000);
        }

        if (document.querySelector('.welcome-logo')) startIdleAnimation();
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
