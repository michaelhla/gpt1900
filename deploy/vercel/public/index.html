<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GPT-1900</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FEFCF8;
            --paper: #F5E6D0;
            --paper-dark: #EDD9BE;
            --tan: #D2B48C;
            --brown: #8B7355;
            --dark-brown: #3E2723;
            --darker-brown: #2C1810;
            --gold: #B8860B;
            --gold-light: #D4A853;
            --gold-muted: #A0845C;
            --ink: #1A120B;
            --ink-light: #4A3728;
            --red-accent: #8B2500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background-color: var(--cream);
        }

        body {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            color: var(--ink);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(210,180,140,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(184,134,11,0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 80%, rgba(139,115,85,0.08) 0%, transparent 45%),
                linear-gradient(180deg, #FEFCF8 0%, #FBF7F0 50%, #F8F3EB 100%);
            background-attachment: fixed;
        }

        /* ── Chat view ──────────────────────────────────── */

        .chat-view {
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: linear-gradient(180deg, var(--cream) 0%, rgba(254,252,248,0.85) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(210,180,140,0.4);
            z-index: 10;
            flex-shrink: 0;
        }

        .chat-header-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header-info h2 {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--dark-brown);
            letter-spacing: 0.04em;
        }

        .chat-header-info .subtitle {
            font-family: 'IM Fell English', serif;
            font-style: italic;
            font-size: 0.8rem;
            color: var(--brown);
            margin-top: 1px;
        }

        .header-ornament {
            font-size: 0.7rem;
            color: var(--tan);
            letter-spacing: 0.3em;
            flex-shrink: 0;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            overscroll-behavior: contain;
        }

        .chat-wrapper {
            max-width: 44rem;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .message {
            display: flex;
            margin-bottom: 0.5rem;
            animation: msgAppear 0.3s ease;
        }

        @keyframes msgAppear {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
            gap: 0.6rem;
            align-items: flex-start;
        }

        .assistant-icon {
            width: 28px;
            height: 28px;
            border: 1px solid var(--tan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 0.35rem;
            background: linear-gradient(135deg, var(--cream), var(--paper));
            color: var(--brown);
            font-family: 'Playfair Display', serif;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .message-content {
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 1.05rem;
            max-width: 100%;
            word-wrap: break-word;
        }

        .message.assistant .message-content {
            background: transparent;
            padding: 0.5rem 0.6rem;
            cursor: pointer;
            border-radius: 3px;
            transition: background-color 0.2s ease;
            color: var(--ink);
        }

        .message.assistant .message-content:hover {
            background-color: rgba(210,180,140,0.12);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, rgba(210,180,140,0.2), rgba(210,180,140,0.3));
            border: 1px solid rgba(210,180,140,0.35);
            border-radius: 1rem 1rem 0.25rem 1rem;
            padding: 0.7rem 1rem;
            max-width: 70%;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
            color: var(--ink);
        }

        .message.user .message-content:hover {
            background: linear-gradient(135deg, rgba(210,180,140,0.3), rgba(210,180,140,0.4));
            border-color: rgba(210,180,140,0.5);
        }

        .message.console .message-content {
            font-family: 'IM Fell English', 'Georgia', serif;
            font-size: 0.9rem;
            background: rgba(210,180,140,0.12);
            border: 1px solid rgba(210,180,140,0.25);
            padding: 0.6rem 0.9rem;
            color: var(--brown);
            border-radius: 3px;
            max-width: 80%;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 3px;
            align-items: center;
            padding: 0.2rem 0;
        }

        .typing-indicator span {
            width: 4px;
            height: 4px;
            background: var(--brown);
            border-radius: 50%;
            animation: typingDot 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingDot {
            0%, 60%, 100% { opacity: 0.2; transform: scale(0.85); }
            30% { opacity: 0.9; transform: scale(1); }
        }

        .input-area {
            padding: 0.75rem 1rem;
            padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
            background: linear-gradient(0deg, var(--cream) 60%, rgba(254,252,248,0.85) 100%);
            border-top: 1px solid rgba(210,180,140,0.3);
            flex-shrink: 0;
        }

        .input-wrapper {
            max-width: 44rem;
            margin: 0 auto;
            display: flex;
            gap: 0.6rem;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--tan);
            border-radius: 2px;
            background: rgba(254,252,248,0.6);
            color: var(--ink);
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 1.05rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 180px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .chat-input::placeholder {
            color: var(--brown);
            opacity: 0.5;
            font-style: italic;
        }

        .chat-input:focus {
            border-color: var(--gold-muted);
            box-shadow: 0 0 0 2px rgba(184,134,11,0.08);
            background: rgba(254,252,248,0.85);
        }

        .send-btn {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            border: 1px solid var(--dark-brown);
            border-radius: 2px;
            background: var(--dark-brown);
            color: var(--cream);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--darker-brown);
            border-color: var(--darker-brown);
        }

        .send-btn:disabled {
            cursor: not-allowed;
            opacity: 0.35;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        .error-message {
            background: rgba(139,37,0,0.08);
            border: 1px solid rgba(139,37,0,0.2);
            color: var(--red-accent);
            padding: 0.6rem 0.9rem;
            border-radius: 3px;
            font-size: 0.95rem;
        }

        /* ── Responsive ─────────────────────────────────── */

        @media (max-width: 520px) {
            .message.user .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>

    <!-- ── Chat Interface ───────────────────────── -->
    <div class="chat-view" id="chatView">
        <div class="chat-header">
            <div class="chat-header-info">
                <h2>GPT-1900</h2>
                <div class="subtitle">Anno Domini</div>
            </div>
            <span class="header-ornament">&diams;&thinsp;&diams;&thinsp;&diams;</span>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="chat-wrapper" id="chatWrapper">
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="chatInput"
                    class="chat-input"
                    placeholder="Compose your enquiry..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button id="sendButton" class="send-btn" onclick="sendMessage()" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14"/>
                        <path d="M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatWrapper = document.getElementById('chatWrapper');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');

        let messages = [];
        let isGenerating = false;
        let currentTemperature = 0.8;
        let currentTopK = 50;

        /* ── Input handling ───────────────────────── */

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 180) + 'px';
            sendButton.disabled = !this.value.trim() || isGenerating;
        });

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        /* ── Messages ─────────────────────────────── */

        function addMessage(role, content, messageIndex) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            if (role === 'assistant') {
                const icon = document.createElement('div');
                icon.className = 'assistant-icon';
                icon.textContent = 'G';
                messageDiv.appendChild(icon);
            }

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            if (role === 'user' && messageIndex !== undefined) {
                contentDiv.setAttribute('title', 'Click to edit');
                contentDiv.addEventListener('click', () => {
                    if (!isGenerating) editMessage(messageIndex);
                });
            }

            if (role === 'assistant' && messageIndex !== undefined) {
                contentDiv.setAttribute('title', 'Click to regenerate');
                contentDiv.addEventListener('click', () => {
                    if (!isGenerating) regenerateMessage(messageIndex);
                });
            }

            messageDiv.appendChild(contentDiv);
            chatWrapper.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return contentDiv;
        }

        function editMessage(messageIndex) {
            if (messageIndex < 0 || messageIndex >= messages.length) return;
            if (messages[messageIndex].role !== 'user') return;

            chatInput.value = messages[messageIndex].content;
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 180) + 'px';

            messages = messages.slice(0, messageIndex);
            const all = chatWrapper.querySelectorAll('.message');
            for (let i = messageIndex; i < all.length; i++) all[i].remove();

            sendButton.disabled = false;
            chatInput.focus();
        }

        async function regenerateMessage(messageIndex) {
            if (messageIndex < 0 || messageIndex >= messages.length) return;
            if (messages[messageIndex].role !== 'assistant') return;

            messages = messages.slice(0, messageIndex);
            const all = chatWrapper.querySelectorAll('.message');
            for (let i = messageIndex; i < all.length; i++) all[i].remove();

            await generateAssistantResponse();
        }

        /* ── Streaming generation ─────────────────── */

        async function generateAssistantResponse() {
            isGenerating = true;
            sendButton.disabled = true;

            const assistantContent = addMessage('assistant', '');
            assistantContent.innerHTML = '<span class="typing-indicator"><span></span><span></span><span></span></span>';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: messages,
                        temperature: currentTemperature,
                        max_tokens: 512,
                        top_k: currentTopK,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';
                let started = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const data = JSON.parse(line.slice(6));

                            if (data.token) {
                                if (!started) {
                                    assistantContent.textContent = '';
                                    started = true;
                                }
                                fullResponse += data.token;
                                assistantContent.textContent = fullResponse;
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }

                            if (data.error) {
                                throw new Error(data.error);
                            }
                        } catch (e) {
                            if (e.message && !e.message.startsWith('Unexpected') && !e.message.startsWith('JSON')) {
                                throw e;
                            }
                        }
                    }
                }

                const idx = messages.length;
                messages.push({ role: 'assistant', content: fullResponse });

                assistantContent.setAttribute('title', 'Click to regenerate');
                assistantContent.addEventListener('click', () => {
                    if (!isGenerating) regenerateMessage(idx);
                });

            } catch (error) {
                assistantContent.innerHTML = `<div class="error-message">${error.message}</div>`;
            } finally {
                isGenerating = false;
                sendButton.disabled = !chatInput.value.trim();
            }
        }

        /* ── Slash commands ───────────────────────── */

        function handleSlashCommand(command) {
            const parts = command.trim().split(/\s+/);
            const cmd = parts[0].toLowerCase();
            const arg = parts[1];

            if (cmd === '/temperature') {
                if (arg === undefined) {
                    addMessage('console', `Current temperature: ${currentTemperature}`);
                } else {
                    const temp = parseFloat(arg);
                    if (isNaN(temp) || temp < 0 || temp > 2) {
                        addMessage('console', 'Temperature must be between 0.0 and 2.0');
                    } else {
                        currentTemperature = temp;
                        addMessage('console', `Temperature set to ${currentTemperature}`);
                    }
                }
                return true;
            } else if (cmd === '/topk') {
                if (arg === undefined) {
                    addMessage('console', `Current top-k: ${currentTopK}`);
                } else {
                    const topk = parseInt(arg);
                    if (isNaN(topk) || topk < 1 || topk > 200) {
                        addMessage('console', 'Top-k must be between 1 and 200');
                    } else {
                        currentTopK = topk;
                        addMessage('console', `Top-k set to ${currentTopK}`);
                    }
                }
                return true;
            } else if (cmd === '/clear') {
                messages = [];
                chatWrapper.innerHTML = '';
                return true;
            } else if (cmd === '/help') {
                addMessage('console',
                    'Commands:\n' +
                    '/temperature [value]  Set sampling temperature (0\u20132)\n' +
                    '/topk [value]         Set top-k filtering (1\u2013200)\n' +
                    '/clear                Clear conversation\n' +
                    '/help                 Show this message'
                );
                return true;
            }
            return false;
        }

        /* ── Send ─────────────────────────────────── */

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || isGenerating) return;

            if (message.startsWith('/')) {
                chatInput.value = '';
                chatInput.style.height = 'auto';
                handleSlashCommand(message);
                return;
            }

            chatInput.value = '';
            chatInput.style.height = 'auto';

            const idx = messages.length;
            messages.push({ role: 'user', content: message });
            addMessage('user', message, idx);

            await generateAssistantResponse();
        }

        chatInput.focus();
        sendButton.disabled = false;
    </script>
</body>
</html>
